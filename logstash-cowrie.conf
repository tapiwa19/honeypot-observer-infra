input {
  beats {
    port => 5044
  }
}

filter {
  # ── SSH / Cowrie events ──────────────────────────────────────────
  if "cowrie" in [tags] {
    json {
      source => "message"
      target => "cowrie"
    }
    ruby {
      code => '
        cowrie = event.get("[cowrie]")
        if cowrie.is_a?(Hash)
          cowrie.each { |k, v| event.set(k, v) }
        end
      '
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
    if [eventid] == "cowrie.command.input" {
      mutate { rename => { "input" => "command_input" } }
    }
  }

  # ── HTTP + FTP Honeypot events (already structured JSON) ─────────
  if "http_honeypot" in [tags] or "ftp_honeypot" in [tags] or "telnet_honeypot" in [tags] or "mysql_honeypot" in [tags] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # ── GeoIP + internal IP tagging (all protocols) ──────────────────
  if [src_ip] {
    ruby {
      code => '
        ip = event.get("src_ip").to_s
        internal = ip.start_with?(
          "10.", "127.", "169.254.",
          "172.16.", "172.17.", "172.18.", "172.19.",
          "172.20.", "172.21.", "172.22.", "172.23.",
          "172.24.", "172.25.", "172.26.", "172.27.",
          "172.28.", "172.29.", "172.30.", "172.31.",
          "192.168."
        )
        if internal
          event.set("geoip", {
            "country_name"  => "Internal/Lab",
            "country_code2" => "XX",
            "city_name"     => "Local Network",
            "ip"            => ip
          })
          event.tag("internal_ip")
        end
      '
    }
    if "internal_ip" not in [tags] {
      geoip {
        source => "src_ip"
        target => "geoip"
      }
    }
  }

  # ── SSH-specific enrichment ───────────────────────────────────────
  if "cowrie" in [tags] {
    if [eventid] =~ /login/ {
      mutate { add_tag => ["authentication"] }
    }
    if [eventid] =~ /command/ {
      mutate { add_tag => ["command_execution"] }
    }
    if [username] {
      mutate { add_field => { "attacker_username" => "%{username}" } }
    }
  }
}

output {
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "honeypot-events"
    action => "create"
    document_id => "%{uuid}-%{eventid}-%{timestamp}"
  }
}
